name: Manual Package

on:
  workflow_dispatch:

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            os: macos-15-intel
            script: package:mac:x64
            artifact: skillops-macos-x64
          - name: macOS Apple Silicon
            os: macos-14
            script: package:mac:arm64
            artifact: skillops-macos-arm64
          - name: Windows x64
            os: windows-latest
            script: package:win:x64
            artifact: skillops-windows-x64
          - name: Linux x64
            os: ubuntu-latest
            script: package:linux:x64
            artifact: skillops-linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/**
          if-no-files-found: error
