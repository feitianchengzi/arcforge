name: Manual Package

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: manual-package
  cancel-in-progress: false

jobs:
  version:
    name: Compute version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: version
        shell: bash
        run: |
          base_version="$(node -p "const manifest = require('./app.manifest.json'); manifest.version")"
          if [[ ! "$base_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "app.manifest.json version must be major.minor.patch." >&2
            exit 1
          fi
          IFS=. read -r major minor _patch <<< "$base_version"

          git fetch --tags --force
          latest_patch=-1
          while IFS= read -r tag; do
            patch_part="${tag#v${major}.${minor}.}"
            if [[ "$patch_part" =~ ^[0-9]+$ && "$patch_part" -gt "$latest_patch" ]]; then
              latest_patch="$patch_part"
            fi
          done < <(git tag -l "v${major}.${minor}.*")
          patch=$((latest_patch + 1))

          version="${major}.${minor}.${patch}"
          tag="v${version}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "Computed ${tag}"

  package:
    name: ${{ matrix.name }}
    needs: version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Intel
            os: macos-15-intel
            script: package:mac:x64
            artifact: skillops-macos-x64
          - name: macOS Apple Silicon
            os: macos-14
            script: package:mac:arm64
            artifact: skillops-macos-arm64
          - name: Windows x64
            os: windows-latest
            script: package:win:x64
            artifact: skillops-windows-x64
          - name: Linux x64
            os: ubuntu-latest
            script: package:linux:x64
            artifact: skillops-linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run version:set -- ${{ needs.version.outputs.version }}

      - run: npm run ${{ matrix.script }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-${{ needs.version.outputs.version }}
          path: release/**
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [version, package]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.version.outputs.tag }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mapfile -d '' files < <(find release-assets -type f -print0 | sort -z)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release assets found." >&2
            exit 1
          fi

          gh release create "$TAG" "${files[@]}" \
            --target "$GITHUB_SHA" \
            --title "SkillOps ${VERSION}" \
            --notes "Manual package build for SkillOps ${VERSION}."
