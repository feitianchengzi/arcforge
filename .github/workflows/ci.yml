name: CI

on:
  # Automatic CI is paused while skills/arcforge-install is the primary install path.
  # Restore pull_request and push triggers here when release automation becomes active again.
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run check
      - run: npm test
