<svg width="1200" height="680" viewBox="0 0 1200 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SkillOps governance concept</title>
  <desc id="desc">A conceptual map showing SkillOps as a local governance layer between local skill sources, audit and profile decisions, local agent targets, and GitHub release preparation.</desc>
  <rect width="1200" height="680" rx="28" fill="#F6F8FB"/>
  <rect x="58" y="54" width="1084" height="572" rx="22" fill="#FFFFFF" stroke="#D9DEE8"/>

  <text x="96" y="116" fill="#111827" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="760">SkillOps concept map</text>
  <text x="96" y="150" fill="#5B6575" font-family="Inter, Arial, sans-serif" font-size="17">Local-first governance before skills reach agents, releases, or registries.</text>

  <g font-family="Inter, Arial, sans-serif">
    <rect x="92" y="228" width="214" height="146" rx="14" fill="#EEF6FF" stroke="#B8D7FF"/>
    <text x="122" y="274" fill="#174EA6" font-size="18" font-weight="700">Local Skill Source</text>
    <text x="122" y="306" fill="#44546A" font-size="14">skills/**/SKILL.md</text>
    <text x="122" y="330" fill="#44546A" font-size="14">references/</text>
    <text x="122" y="354" fill="#44546A" font-size="14">shared assets</text>

    <rect x="362" y="206" width="252" height="190" rx="18" fill="#111827"/>
    <text x="402" y="258" fill="#FFFFFF" font-size="24" font-weight="760">SkillOps</text>
    <text x="402" y="294" fill="#B8C2D0" font-size="15">scan, audit, profile</text>
    <text x="402" y="322" fill="#B8C2D0" font-size="15">apply, drift check</text>
    <text x="402" y="350" fill="#B8C2D0" font-size="15">publish readiness</text>

    <rect x="670" y="146" width="198" height="118" rx="14" fill="#F8FAFC" stroke="#D9DEE8"/>
    <text x="700" y="190" fill="#1F2937" font-size="17" font-weight="700">Audit gate</text>
    <text x="700" y="224" fill="#667085" font-size="14">secrets, risky rules</text>

    <rect x="910" y="146" width="198" height="118" rx="14" fill="#F8FAFC" stroke="#D9DEE8"/>
    <text x="940" y="190" fill="#1F2937" font-size="17" font-weight="700">Profiles</text>
    <text x="940" y="224" fill="#667085" font-size="14">project/team sets</text>

    <rect x="670" y="340" width="198" height="118" rx="14" fill="#F8FAFC" stroke="#D9DEE8"/>
    <text x="700" y="384" fill="#1F2937" font-size="17" font-weight="700">Agent targets</text>
    <text x="700" y="418" fill="#667085" font-size="14">Codex, Claude, Cursor</text>

    <rect x="910" y="340" width="198" height="118" rx="14" fill="#F8FAFC" stroke="#D9DEE8"/>
    <text x="940" y="384" fill="#1F2937" font-size="17" font-weight="700">GitHub release</text>
    <text x="940" y="418" fill="#667085" font-size="14">review checklist</text>

    <path d="M306 301H346" stroke="#98A2B3" stroke-width="2.5"/>
    <path d="M338 292L346 301L338 310" stroke="#98A2B3" stroke-width="2.5"/>
    <path d="M614 272C640 246 642 206 670 206" stroke="#98A2B3" stroke-width="2.5"/>
    <path d="M662 198L670 206L660 214" stroke="#98A2B3" stroke-width="2.5"/>
    <path d="M868 205H900" stroke="#98A2B3" stroke-width="2.5"/>
    <path d="M892 197L900 205L892 213" stroke="#98A2B3" stroke-width="2.5"/>
    <path d="M614 330C640 358 642 399 670 399" stroke="#98A2B3" stroke-width="2.5"/>
    <path d="M660 391L670 399L660 407" stroke="#98A2B3" stroke-width="2.5"/>
    <path d="M868 399H900" stroke="#98A2B3" stroke-width="2.5"/>
    <path d="M892 391L900 399L892 407" stroke="#98A2B3" stroke-width="2.5"/>

    <path d="M769 458V500C769 515 757 527 742 527H224C209 527 197 515 197 500V376" stroke="#98A2B3" stroke-width="2" stroke-dasharray="7 8"/>
    <path d="M189 386L197 376L205 386" stroke="#98A2B3" stroke-width="2"/>
    <text x="344" y="552" fill="#667085" font-size="14">Drift reports close the loop between installed copies and the maintained local source.</text>

    <rect x="96" y="582" width="306" height="2" rx="1" fill="#2563EB"/>
    <rect x="414" y="582" width="272" height="2" rx="1" fill="#10B981"/>
    <rect x="698" y="582" width="404" height="2" rx="1" fill="#F59E0B"/>
    <text x="96" y="612" fill="#44546A" font-size="13">Local filesystem is the working source</text>
    <text x="414" y="612" fill="#44546A" font-size="13">Governance decisions</text>
    <text x="698" y="612" fill="#44546A" font-size="13">GitHub remains review and release source of truth</text>
  </g>
</svg>
