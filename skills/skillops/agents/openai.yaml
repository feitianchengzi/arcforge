interface:
  display_name: "SkillOps"
  short_description: "治理项目本地 agent skills，并准备 GitHub-first 分享。"
  default_prompt: "使用 $skillops 处理项目本地 skill 治理：按用户当前意图选择扫描、审计、profile 组织、正式化、应用、漂移检查、分享准备或产品能力建设中的一个阶段。不要把端到端能力路线当成每次都要执行的固定链路；只有用户明确要求端到端推进时才串联阶段。输出需包含当前项目状态、当前阶段、选中 skill/profile、正式来源、目标目录、下一条命令或 Desktop 动作，以及是否需要确认。真实写入、Git 更新、push、PR、share run、目标替换和真实目标 apply 前必须先确认；临时验证需使用临时路径并设置 SKILLOPS_HOME。"
