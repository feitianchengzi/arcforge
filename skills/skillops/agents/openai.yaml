interface:
  display_name: "SkillOps"
  short_description: "治理、审计、同步和发布前检查本地 agent skills。"
  default_prompt: "使用 $skillops 治理本地 agent skills。先判断用户当前阶段，再从扫描、审计、profile、正式化、应用、应用关系、drift、Git 来源维护、发布准备、Git 共享、环境诊断和 Desktop UI 中组合流程；不要默认跑完整链路。SkillOps 是 local-first、GitHub-first 的发布前和团队治理层，不是 marketplace、registry 或 agent runtime。真实写入、Git 更新、push/PR/share run、目标替换和真实目标 apply 前必须确认；临时验证设置 SKILLOPS_HOME。详细命令、产品概念、Desktop 路由和缺口判断按 SKILL.md 渐进加载。"
