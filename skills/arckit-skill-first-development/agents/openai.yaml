interface:
  display_name: "ArcKit Skill First 开发"
  short_description: "用 Skill First 闭环自迭代 skills，正式 skill 先复制再改。"
  default_prompt: "使用 $arckit-skill-first-development 先根据当前 agent 检查用户级和项目级正式 skill；如果要修改正式 skill，先完整复制到当前项目根 skills/<skill-name>/，只改工作副本。Skill First 默认真实启动子代理做前测和复测，不需要用户额外确认；只有没有可用子代理工具或工具不可恢复失败时才降级模拟。目标 skill、references 和 agents/openai.yaml 默认使用用户当前请求语言。最终汇报原始路径、工作副本路径、模拟轮次、修复内容和校验结果。"
