interface:
  display_name: "ArcForge Install"
  short_description: "安装 ArcForge skills、CLI、Desktop launcher，并用快速或严格治理模式引导推荐 Skill 项目。"
  default_prompt: "使用 $arcforge-install 从当前 ArcForge 仓库执行本地安装：先确认仓库根目录和真实写入目标，再安装用户级 arcforge 与 arcforge-skill-first skills、构建 CLI shim，并用默认 --desktop install 写入可真实调起的 arcforge-desktop launcher。CLI 和 Desktop launcher 必须安装到普通新终端可用的持久用户级 bin 目录，默认优先 ~/.local/bin；不要把 shim 写到 Codex、Claude、Cursor 等 agent 注入的临时 PATH 或 node_modules vendor 目录。安装后必须用脚本输出的 CLI shim 绝对路径验证 doctor 和 scan；如果当前 agent 会话的裸 arcforge/arcforge-desktop 被临时 codex-path 等 wrapper 抢先命中，只作为 transient PATH warning 报告，不要覆盖临时 wrapper，也不要把它当成持久安装失败。还必须验证首个非临时 PATH 命中是否指向当前安装，并验证首个非临时 arcforge 能实际执行 doctor；如果用户目录下更早的旧 wrapper shadow 了新 shim，脚本必须自动覆盖修复；如果 shadow 不可写或在用户目录之外，安装必须失败并报告原因。只有用户明确要求时才改用 --desktop package 或 --desktop skip。用户目标包含新普通终端直接执行命令时，说明可能需要 --update-path；只有用户明确允许时才修改 shell profile。临时预检必须使用 --home/--shim-dir 或 --dry-run，必要时加 --npm-cache，避免写入真实用户目录和真实 npm cache；使用 --home/--shim-dir 做临时安装验证时，必须让临时 shim 目录排在 PATH 最前，必要时使用只包含临时 shim、Node bin 和系统基础目录的隔离 PATH，避免真实用户级旧 arcforge 或 arcforge-desktop wrapper 被判定为临时 HOME 外的不可修复 PATH shadow；不能启动 GUI 时用 --verify 做 headless 检查。真实首次安装不要默认跳过 npm install。ArcForge 自身安装和验证完成后，进入推荐 Skill 项目阶段：说明 arckit 是飞天橙子的 AI Agent Skills 中心，面向 AI-agent-assisted software development 的完整协作生命周期，覆盖想法/商机、决策框架、产品规格、交互、视觉、技术方案、项目治理、项目记忆、pending 上下文、通用 debug 诊断和 Workshop Desktop 桥接等 workflow，并且不维护具体技术栈 coding workflow；说明 arckit-code 是飞天橙子的具体技术栈 coding skills 仓库，用来承载语言、框架、平台和 SDK 级别的写代码实践，当前重点包含 SwiftUI/Apple 客户端默认架构与反馈平台接入流程。默认 --recommended-mode prompt 和 --recommended-skills prompt 会进入等待模式选择状态，不静默克隆 GitHub，也不写入额外 skills；当脚本输出 AGENT ACTION REQUIRED: recommended install mode choice pending 或 Recommended skill stage: pending_install_mode_choice 时，安装回合的最后一个 agent-facing action 必须是教学式解释快速安装模式、严格治理模式和暂不安装，并直接询问用户选择哪种模式。快速安装模式使用 --recommended-mode quick：显式传 --recommended-skills 时必须同时传 --recommended-mode quick 或 --recommended-mode governed，不要生成旧式隐式快速安装命令；再询问安装 arckit 和 arckit-code、只安装 arckit、只安装 arckit-code 或跳过；用户选择后通过刚安装好的 arcforge CLI 对 https://github.com/feitianchengzi/arckit 和/或 https://github.com/feitianchengzi/arckit-code 执行 drift、apply --confirm、再 drift。快速模式必须解释其端点：来源是 GitHub URL，临时 checkout 只用于读取，维护源本轮无，应用目标是当前 agent 用户级 skills 目录，共享目标本轮无，关系记录默认不保存。严格治理模式使用 --recommended-mode governed：不要由安装脚本写入推荐 skills；切换到 $arcforge workflow，先确认来源/上游源、维护源、应用目标、共享目标、profile/skills、是否保存 applied source record，以及关系记录归属 root，再按确认结果执行 drift/apply --save 或 import plan/run。飞天橙子内部使用者和开源使用者走同一个 GitHub-first 路径。输出必须包含用户级 skill 目标、CLI shim 路径、修复过的旧 wrapper、Desktop launcher 路径、arcforge/arcforge-desktop 命令解析验证结果、transient PATH warning、推荐 Skill 项目阶段状态和剩余手动动作；除非用户明确允许，不要使用 --update-path、不要做远程发布或 Git 写入。"
