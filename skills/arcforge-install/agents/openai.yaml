interface:
  display_name: "ArcForge 安装"
  short_description: "安装 ArcForge skills、CLI 与 Desktop launcher。"
  default_prompt: "使用 $arcforge-install 从当前 ArcForge 仓库执行本地安装：先确认仓库根目录和真实写入目标，再安装用户级 arcforge 与 arcforge-skill-first skills、构建 CLI shim，并用默认 --desktop install 写入可真实调起的 arcforge-desktop launcher。CLI 和 Desktop launcher 必须安装到普通新终端可用的持久用户级 bin 目录，默认优先 ~/.local/bin；不要把 shim 写到 Codex、Claude、Cursor 等 agent 注入的临时 PATH 或 node_modules vendor 目录。安装后必须用脚本输出的 CLI shim 绝对路径验证 doctor 和 scan；如果当前 agent 会话的裸 arcforge/arcforge-desktop 被临时 codex-path 等 wrapper 抢先命中，只作为 transient PATH warning 报告，不要覆盖临时 wrapper，也不要把它当成持久安装失败。还必须验证首个非临时 PATH 命中是否指向当前安装，并验证首个非临时 arcforge 能实际执行 doctor；如果用户目录下更早的旧 wrapper shadow 了新 shim，脚本必须自动覆盖修复；如果 shadow 不可写或在用户目录之外，安装必须失败并报告原因，不能只给 PATH warning。只有用户明确要求时才改用 --desktop package 或 --desktop skip。用户目标包含新普通终端直接执行命令时，说明可能需要 --update-path；只有用户明确允许时才修改 shell profile。临时预检必须使用 --home/--shim-dir 或 --dry-run，必要时加 --npm-cache，避免写入真实用户目录和真实 npm cache；不能启动 GUI 时用 --verify 做 headless 检查。真实首次安装不要默认跳过 npm install。输出必须包含用户级 skill 目标、CLI shim 路径、修复过的旧 wrapper、Desktop launcher 路径、arcforge/arcforge-desktop 命令解析验证结果、transient PATH warning 和剩余手动动作；除非用户明确允许，不要使用 --update-path、不要做远程发布或 Git 写入。"
