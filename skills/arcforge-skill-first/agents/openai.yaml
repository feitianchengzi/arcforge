interface:
  display_name: "ArcForge Skill First"
  short_description: "用 Skill First 闭环把工作模式或已有 skill 执行过程建模为软件能力单元，创建、观察、验证并迭代 skills，验证通过后引导进入 ArcForge 治理。"
  default_prompt: "使用 $arcforge-skill-first 先判断本轮是创建/更新 skill，还是观察已有 skill 执行真实任务。用户显式写出 skill first: 时，$arcforge-skill-first 是元入口；真实任务需要的其他 skill 是执行入口、辅助入口或治理入口，不要让执行入口绕过 Skill First 直接接管整轮任务。先说明元入口、执行入口、辅助入口、验证入口或治理入口的分工，并确定本轮目标 skill。可以借鉴 skill-creator 的结构、命名、frontmatter、资源目录和基础校验规则，但不要停在标准 skill 文件夹或 scripts/references/assets 清单；Skill First 必须用真实任务和子代理执行记录验证目标 skill 是否作为能力入口可用。然后根据当前 agent 检查用户级和项目级正式 skill；如果要修改正式 skill，先完整复制到当前项目根 skills/<skill-name>/，只改工作副本；如果只是观察已有 skill 执行，可以先读取原始路径，不要为了观察而复制。读取目标 skill 后，把它建模为软件能力单元：判断该 skill 需要哪些实现承载，包括 SKILL.md、references、CLI、server、UI、状态、schema、测试 fixture 和 UI 回传机制；不要一开始就把维护范围缩窄成 Markdown。只在目标 skill 的实现层发现承载是否已经存在，例如当前项目、其他仓库、CLI、server、Desktop/Web UI、MCP、脚本、内部服务、schema 或 fixture；如果上下文不足且可能重复造实现，向用户询问路径、仓库、服务或入口。再判断本轮是观察已有执行、接入已有实现、维护已有实现、包装进 skill，还是新建最小实现。Skill First 默认真实启动子代理做前测和复测，不需要用户额外确认；但用户明确要求不要启动或要求停止时必须服从。传给子代理的是执行入口 skill 路径、真实任务、工作区、临时路径和写入边界；不要传主 agent 的诊断、预期答案、问题分类、修复思路或请评价 skill 是否需要优化。子代理只负责像普通使用者一样执行任务并记录步骤、命令、路径、错误、确认点和卡点；主 agent 负责观察、归因、分类和修复。目标 skill、references 和 agents/openai.yaml 默认使用用户当前请求语言。如果需要 UI，说明 UI 承载的用户动作、结构化输出、回传路径和 agent 下一步。用户确认目标 skill 可用后，只说明建议进入的 ArcForge 治理阶段，不绕过 arcforge 的确认规则，不自动执行真实写入、apply、share、push 或目标目录覆盖。最终汇报任务需要的 skill 入口集合、本轮模式、本轮目标 skill、原始路径、工作副本路径、软件能力单元建模结果、已有实现承载发现结果、本轮策略、模拟轮次、主 agent 基于执行记录发现的问题、修复内容、用户确认状态、建议的 ArcForge 下一步和校验结果。"
