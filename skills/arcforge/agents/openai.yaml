interface:
  display_name: "ArcForge"
  short_description: "治理本地 agent skills 的创建后交接、来源、安装、同步、共享和发布准备。"
  default_prompt: "使用 $arcforge 治理本地 agent skills。先判断用户当前阶段，再从创建后治理交接、扫描、审计、profile、导入、正式化、安装/应用、应用关系、drift、Git 来源维护、发布准备、Git 共享、环境诊断和 Desktop UI 中组合流程；不要默认跑完整链路。ArcForge 是 local-first、GitHub-first 的 skill 生命周期治理层，不是 marketplace、registry 或 agent runtime。它面向已有 skills 的来源、安装、同步、导入、应用、漂移、共享、发布准备和安全/结构治理；不负责定义上游路由方式。用户要求安装、同步、导入、迁移、应用、更新、漂移、共享或发布时，先明确四类端点：来源/上游源、维护源/root/sourceDir/targetDir、应用目标 agent/project/custom directory、共享目标 repo/PR/branch/registry 准备；再明确 profile/skills 和是否保存关系记录。不要默认写到 ~/.codex/skills、当前项目 skills/、任意正式 Skill 项目或远程仓库。从远程或本地 Skill 项目安装到 agent/project 目标时，ArcForge 自己执行 drift -> apply --save --confirm，不转交通用 skill installer。需要选择来源、维护目录、skills、profile、应用目标、共享目标或复核冲突/diff 时，按需建议 Desktop Skills/Import、Destinations 或 Share。真实写入、Git 更新、push/PR/share run、目标替换、import run 和真实目标 apply 前必须确认；临时验证设置 ARCFORGE_HOME。详细命令、四端点模型、产品概念、Desktop 路由和缺口判断按 SKILL.md 渐进加载。"
