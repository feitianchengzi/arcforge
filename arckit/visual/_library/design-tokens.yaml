metadata:
  project: SkillOps
  source: docs/assets/skillops-overview.svg
  brief: ./brief.md

colors:
  brand:
    primary:
      value: "#1F6FEB"
      description: 主操作蓝，用于主按钮、选中态、链接和关键行动。
    primary_hover:
      value: "#174EA6"
      description: 主操作悬停和选中态文字色。
    logo_accent:
      value: "#7DD3FC"
      description: 品牌识别青色，用于 logo 和少量视觉锚点。

  surface:
    app:
      value: "#F3F5F8"
      description: 应用页面背景，承载白色内容面板。
    app_alt:
      value: "#F6F7F9"
      description: 轻微差异化页面背景，用于实际桌面界面。
    panel:
      value: "#FFFFFF"
      description: 内容面板、指标卡、按钮默认背景。
    panel_subtle:
      value: "#F8FAFC"
      description: 次级面板、空态、列表辅助背景。
    selected:
      value: "#E8F1FF"
      description: 选中态和推荐行动背景。
    sidebar:
      value: "#15181F"
      description: 全局侧栏深色背景。
    sidebar_muted:
      value: "#0F1218"
      description: 侧栏项目、输入和暗色列表背景。
    sidebar_active:
      value: "#242B36"
      description: 侧栏当前项目或激活项背景。

  border:
    default:
      value: "#E5E7EB"
      description: 面板、列表行和普通卡片边框。
    strong:
      value: "#D0D5DD"
      description: 按钮、输入框和较强分割边框。
    chrome:
      value: "#D9DEE8"
      description: App shell 展示外框边线。
    selected:
      value: "#B8D2FF"
      description: 选中态边框。
    sidebar:
      value: "#2B313D"
      description: 深色侧栏内的边框。

  text:
    primary:
      value: "#202124"
      description: 默认正文和重要数字文本。
    heading:
      value: "#1F2937"
      description: 页面标题和面板标题文本。
    secondary:
      value: "#344054"
      description: 次级正文、普通按钮文本。
    muted:
      value: "#667085"
      description: 说明文字、路径、标签和辅助信息。
    inverse:
      value: "#FFFFFF"
      description: 深色侧栏和主按钮上的文字。
    sidebar_muted:
      value: "#A7B0C0"
      description: 侧栏辅助文字。
    sidebar_text:
      value: "#D8DEE9"
      description: 侧栏普通文字。

  semantic:
    success:
      value: "#11845B"
      description: 审计通过、健康状态和成功指标。
    success_bg:
      value: "#E8F5EE"
      description: 成功提示的浅色背景。
    warning:
      value: "#9A6700"
      description: 警告文本和风险代码。
    warning_metric:
      value: "#B7791F"
      description: 警告类指标数字。
    warning_bg:
      value: "#FFFAF0"
      description: 警告发现项背景。
    warning_border:
      value: "#F8D98C"
      description: 警告发现项边框。
    danger:
      value: "#C0392B"
      description: 严重风险和关键问题指标。
    danger_bg:
      value: "#FFF8F7"
      description: 严重风险发现项背景。

typography:
  font_family:
    ui:
      value: "Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
      description: 默认界面字体。
    mono:
      value: "SFMono-Regular, Consolas, Liberation Mono, Menlo, monospace"
      description: 路径、命令和 token 值字体。
  scale:
    page_title:
      size: 28
      weight: 750
      line_height: 1.18
      description: 页面主标题。
    section_title:
      size: 18
      weight: 700
      line_height: 1.3
      description: 面板标题。
    brand_title:
      size: 20
      weight: 700
      line_height: 1.2
      description: 产品名和侧栏品牌标题。
    metric:
      size: 42
      weight: 750
      line_height: 1
      description: 关键指标数字。
    body:
      size: 14
      weight: 400
      line_height: 1.45
      description: 默认正文。
    control:
      size: 13
      weight: 650
      line_height: 1.2
      description: 按钮、导航和列表主标签。
    caption:
      size: 12
      weight: 400
      line_height: 1.35
      description: 辅助说明、路径和 metadata。

spacing:
  xxs: { value: 3, description: 紧凑文本或列表内部微间距。 }
  xs: { value: 6, description: 图标与文字、紧凑控件间距。 }
  sm: { value: 8, description: 默认小间距和 segmented 控件间距。 }
  md: { value: 12, description: 列表行内边距和控件水平间距。 }
  lg: { value: 16, description: 面板内部基础边距。 }
  xl: { value: 24, description: 页面区块间距和较大面板内边距。 }
  xxl: { value: 28, description: 页面主内容外边距。 }
  display: { value: 40, description: README 预览图展示容器边距。 }

radius:
  xs: { value: 4, description: 代码标签和小徽标圆角。 }
  sm: { value: 6, description: 小控件圆角。 }
  md: { value: 8, description: 默认按钮、输入、列表行和卡片圆角。 }
  lg: { value: 10, description: 指标卡和主要面板圆角。 }
  preview: { value: 18, description: README 预览图 app shell 圆角。 }
  canvas: { value: 24, description: README 图片画布外框圆角。 }
  pill: { value: 999, description: 状态徽标和胶囊控件圆角。 }

shadow:
  none:
    value: "none"
    description: 大多数工具面板默认无阴影。
  xs:
    value: "0 1px 2px rgba(16, 24, 40, 0.04)"
    description: 白色面板的极轻层次。
  modal:
    value: "0 20px 48px rgba(16, 24, 40, 0.22)"
    description: 模态和浮层阴影。

motion:
  duration:
    fast: { value: "120ms", description: hover 和 focus 快速反馈。 }
    normal: { value: "180ms", description: tab、列表选中和面板状态切换。 }
  easing:
    standard: { value: "cubic-bezier(0.2, 0, 0, 1)", description: 标准工具界面缓动。 }
