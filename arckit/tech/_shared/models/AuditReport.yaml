metadata:
  path: tech/_shared/models/AuditReport.yaml
  domain: audit
  entity_name: AuditReport
  storage: in_memory
  owner: core/audit
  version: 1
  created: 2026-05-21
  updated: 2026-06-13
type: object
required:
  - root
  - generatedAt
  - skills
  - findings
  - score
  - disclaimer
  - feedbackUrl
properties:
  root:
    type: string
    description: Absolute workspace root path.
  generatedAt:
    type: string
    format: date-time
  skills:
    type: array
    description: Skill summaries included in the audited workspace snapshot.
    items:
      type: object
  findings:
    type: array
    items:
      type: object
      required:
        - severity
        - code
        - message
        - file
      properties:
        severity:
          type: string
          enum:
            - info
            - warning
            - critical
        code:
          type: string
          examples:
            - secret.openai
            - risk.auto_commit
            - quality.frontmatter_missing
        message:
          type: string
        file:
          type: string
          description: Workspace-relative file path.
        line:
          type: integer
          minimum: 1
          nullable: true
        source:
          type: string
          enum:
            - rule
            - agent
          description: Whether the finding came from deterministic rules or Agent-assisted diagnosis.
        evidence:
          type: string
          description: Short supporting excerpt or reason for Agent findings.
        confidence:
          type: string
          enum:
            - low
            - medium
            - high
          description: Confidence level for Agent-assisted findings.
  score:
    type: integer
    minimum: 0
    maximum: 100
  disclaimer:
    type: string
    description: User-facing explanation that audit combines local rule checks with optional Agent-assisted diagnosis and can miss issues or report false positives.
  feedbackUrl:
    type: string
    format: uri
    description: GitHub issue URL where users can report audit gaps or request stronger rule coverage.
  mode:
    type: string
    enum:
      - rule
      - agent
      - hybrid
    description: Audit mode used to generate the report.
  agent:
    type: object
    description: Optional Agent diagnosis run summary.
    properties:
      name:
        type: string
      status:
        type: string
        enum:
          - not_requested
          - completed
          - failed
          - timeout
          - unavailable
      durationMs:
        type: integer
      command:
        type: string
      error:
        type: string
state_machine:
  scoring:
    initial: 100
    penalties:
      critical: 25
      warning: 8
      info: 2
    floor: 0
validation:
  severe_cli_exit:
    description: CLI audit exits with code 2 when any finding has severity critical.
