metadata:
  path: tech/_shared/models/ShareResult.yaml
  domain: sharing-ipc
  entity_name: ShareResult
  storage: in_memory
  owner: electron/main
  version: 2
  created: 2026-05-21
  updated: 2026-05-25
type: object
required:
  - remoteUrl
  - branch
  - committed
  - pushed
  - messages
properties:
  remoteUrl:
    type: string
    description: Clone URL used for the shared repository.
  branch:
    type: string
    description: Branch pushed to origin.
  targetPath:
    type: string
    nullable: true
    description: Repository-relative project path.
  checkoutRoot:
    type: string
    nullable: true
    description: Local isolated checkout path containing the share branch.
  committed:
    type: boolean
    description: True when git status contained file changes and a commit was created.
  pushed:
    type: boolean
    description: True when git push completes successfully.
  sameRepository:
    type: boolean
    nullable: true
    description: True when the share was committed and pushed from the local source repository instead of an isolated checkout.
  delivery:
    type: string
    nullable: true
    enum:
      - targetPullRequest
      - forkPullRequest
      - directPush
      - localBranch
    description: Delivery method used for the share operation.
  pullRequestUrl:
    type: string
    nullable: true
    description: Created GitHub Pull Request URL when PR delivery succeeds.
  commitHash:
    type: string
    nullable: true
    description: Local share commit hash.
  manualCommands:
    type: array
    nullable: true
    items:
      type: string
    description: Recovery commands for manual push or PR creation.
  messages:
    type: array
    items:
      type: string
    description: Git and sharing operation messages displayed in the desktop UI.
validation:
  no_changes:
    description: committed is false when there are no file changes; pushed remains false and no Pull Request is created.
