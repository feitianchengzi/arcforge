metadata:
  path: tech/_shared/models/ArcForgeConfig.yaml
  domain: shared
  entity_name: ArcForgeConfig
  storage: ~/.arcforge/projects/<project-key>.json
  owner: core/config
  version: 1
  created: 2026-05-21
  updated: 2026-05-25
type: object
required:
  - version
  - sourceDir
  - profiles
properties:
  version:
    type: integer
    const: 1
    description: Workspace configuration schema version.
  sourceDir:
    type: string
    minLength: 1
    default: skills
    description: Directory under the workspace root that contains skill folders and shared assets.
  teamRepo:
    type: string
    nullable: true
    description: GitHub or Git source used for team sharing and install references.
  shareTargetMode:
    type: string
    enum:
      - direct
      - namedProject
    nullable: true
    description: Strategy used when writing the project into a shared repository.
  shareProjectName:
    type: string
    nullable: true
    description: Project folder name used when shareTargetMode is namedProject.
  applyTargets:
    type: array
    nullable: true
    description: Saved desktop target groups for applying or checking drift across agent, project, and custom directories.
    items:
      type: object
      required:
        - id
        - name
        - profile
        - agentTargetIds
        - projectTargetDirs
      properties:
        id:
          type: string
        name:
          type: string
        profile:
          type: string
        agentTargetIds:
          type: array
          items:
            type: string
          description: Selected agent identifiers. Combined with projectTargetDirs when project folders are present.
        projectTargetDirs:
          type: array
          items:
            type: string
          description: Project folders used to route selected agents into project-level skill directories.
        customTargetDirs:
          type: array
          nullable: true
          items:
            type: string
          description: User-selected directories used exactly as apply or drift targets.
  shareTargets:
    type: array
    nullable: true
    description: Saved desktop target groups for sharing the project to Git repositories.
    items:
      type: object
      required:
        - id
        - name
        - profile
        - remoteUrl
        - targetMode
      properties:
        id:
          type: string
        name:
          type: string
        profile:
          type: string
        remoteUrl:
          type: string
        targetMode:
          type: string
          enum:
            - direct
            - namedProject
        projectName:
          type: string
          nullable: true
        sameRepository:
          type: boolean
          nullable: true
          description: True when this desktop share target should use the current local Git repository remote.
        sameRepositoryRemote:
          type: string
          nullable: true
          description: Local Git remote name selected for same-repository sharing.
  profiles:
    type: array
    items:
      type: object
      required:
        - name
        - skills
        - targets
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
          nullable: true
        skills:
          type: array
          items:
            type: string
          description: Skill names or the wildcard value '*'.
        targets:
          type: array
          items:
            type: string
          description: Agent target identifiers such as codex, claude, or cursor.
validation:
  default_profile:
    description: Missing config files resolve to one default profile with wildcard skills.
  normalized_save:
    description: Saved config trims profile names, descriptions, teamRepo, shareProjectName, target group names, remote URLs, project names, and target directory lists.
  apply_target_group:
    description: A desktop apply target group is valid when it has at least one agent target or one custom target. Project target directories require at least one agent target.
