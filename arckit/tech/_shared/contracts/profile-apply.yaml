metadata:
  path: tech/_shared/contracts/profile-apply.yaml
  domain: profiles-sync
  owner: electron/main
  version: 1
  created: 2026-05-21
  updated: 2026-05-21
endpoint:
  transport: electron-ipc
  channel: profile:apply
  method_name: applyProfile
  summary: Copy selected profile skills and shared assets to a target directory.
  auth_required: false
request:
  args:
    - name: root
      type: string
      required: true
    - name: profile
      type: string
      required: true
    - name: targetDir
      type: string
      required: true
responses:
  success:
    schema:
      $ref: "../models/ApplyProfileResult.yaml"
  errors:
    - code: PROFILE_NOT_FOUND
      message: Profile not found.
    - code: TARGET_WRITE_FAILED
      message: Target directory cannot be created or written.
business_logic:
  flow:
    - Scan workspace.
    - Select skills by profile.
    - Copy missing skill and asset directories without overwriting existing targets.

