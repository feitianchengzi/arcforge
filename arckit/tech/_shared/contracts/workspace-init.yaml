metadata:
  path: tech/_shared/contracts/workspace-init.yaml
  domain: workspace
  owner: electron/main
  version: 1
  created: 2026-05-21
  updated: 2026-05-25
endpoint:
  transport: electron-ipc
  channel: workspace:init
  method_name: initWorkspace
  summary: Initialize or refresh local SkillOps project state for a workspace.
  auth_required: false
request:
  args:
    - name: root
      type: string
      required: true
responses:
  success:
    schema:
      $ref: "../models/SkillOpsConfig.yaml"
  errors:
    - code: CONFIG_WRITE_FAILED
      message: Local SkillOps project state cannot be written.
business_logic:
  flow:
    - Build version 1 config with sourceDir skills, or sourceDir . when the selected root is itself a skill folder.
    - Add default profile with wildcard skills and codex, claude, cursor targets.
    - Persist config under the user-level SkillOps project state directory.
