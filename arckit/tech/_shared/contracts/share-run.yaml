metadata:
  path: tech/_shared/contracts/share-run.yaml
  domain: sharing-ipc
  owner: electron/main
  version: 3
  created: 2026-06-01
  updated: 2026-06-01
endpoint:
  transport: electron-ipc
  channel: share:run
  method_name: shareProject
  summary: Confirm and execute SkillOps sharing with branch, push and optional Pull Request creation.
  auth_required: false
request:
  args:
    - name: root
      type: string
      required: true
    - name: remoteUrl
      type: string
      required: true
    - name: visibility
      type: string
      required: true
      enum:
        - private
        - public
    - name: message
      type: string
      required: true
    - name: targetMode
      type: string
      required: true
      enum:
        - direct
        - namedProject
    - name: projectName
      type: string
      required: true
    - name: profileName
      type: string
      required: true
    - name: delivery
      type: string
      required: false
      enum:
        - targetPullRequest
        - forkPullRequest
        - directPush
        - localBranch
    - name: branch
      type: string
      required: false
    - name: confirm
      type: boolean
      required: false
    - name: sameRepository
      type: boolean
      required: false
    - name: sameRepositoryRemote
      type: string
      required: false
responses:
  success:
    schema:
      $ref: "../models/ShareResult.yaml"
  errors:
    - code: REMOTE_URL_REQUIRED
      message: Remote URL is required unless sameRepository is true.
    - code: REMOTE_URL_INVALID
      message: Remote URL cannot be parsed.
    - code: PROJECT_NAME_REQUIRED
      message: Project name is required when sharing under a project folder.
    - code: GIT_COMMAND_FAILED
      message: Clone, fetch, checkout, pull, commit, or push failed.
    - code: CONFIRM_REQUIRED
      message: Remote sharing requires explicit confirmation.
    - code: DELIVERY_UNAVAILABLE
      message: Requested delivery method is not available for the current GitHub access state.
    - code: PR_CREATE_FAILED
      message: Pull Request creation failed after local commit or push.
    - code: LOCAL_GIT_REMOTE_REQUIRED
      message: Same-repository sharing requires the workspace to be inside a Git repository with at least one remote.
business_logic:
  flow:
    - Parse remote source and target subdirectory unless sameRepository is true.
    - Scan workspace and save local sharing settings.
    - Inspect GitHub CLI availability, login state and repository permission for ordinary remote sharing.
    - Choose target Pull Request, fork Pull Request, direct push or local branch delivery for ordinary remote sharing.
    - Prepare isolated shared checkout under app data or CLI cache for ordinary remote sharing.
    - Create or reset the share branch from the resolved base branch for ordinary remote sharing.
    - Copy sourceDir, config, and README into target path for ordinary remote sharing.
    - For sameRepository, resolve local Git root, selected remote, current branch and workspace relative path.
    - For sameRepository, stage and commit only the workspace relative path.
    - Commit changes when git status is non-empty.
    - Skip push and Pull Request creation when no commit is created.
    - Push branch to origin or fork remote when delivery requires remote writes.
    - For sameRepository, push current branch to the selected local Git remote.
    - Create Pull Request when delivery is targetPullRequest or forkPullRequest.
