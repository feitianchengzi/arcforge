metadata:
  path: tech/_shared/contracts/source-update.yaml
  domain: sharing-ipc
  owner: electron/main
  version: 1
  created: 2026-05-25
  updated: 2026-05-25
endpoints:
  - transport: electron-ipc
    channel: source:status
    method_name: sourceUpdateStatus
    summary: Check whether a Git-backed Skill project is ahead or behind upstream.
    auth_required: false
    request:
      args:
        - name: root
          type: string
          required: true
    responses:
      success:
        schema:
          $ref: "../models/SourceUpdateStatus.yaml"
      errors:
        - code: NOT_GIT_REPOSITORY
          message: Current SkillOps project is not inside a Git repository.
        - code: DETACHED_HEAD
          message: Source update checks require a branch.
        - code: UPSTREAM_MISSING
          message: Current branch has no upstream branch.
        - code: GIT_COMMAND_FAILED
          message: Git fetch, rev-parse, rev-list, or status failed.
  - transport: electron-ipc
    channel: source:update
    method_name: updateSource
    summary: Fast-forward update a Git-backed Skill project after explicit confirmation.
    auth_required: false
    request:
      args:
        - name: root
          type: string
          required: true
        - name: confirm
          type: boolean
          required: true
    responses:
      success:
        schema:
          $ref: "../models/SourceUpdateResult.yaml"
      errors:
        - code: CONFIRM_REQUIRED
          message: Source update requires explicit confirmation.
        - code: LOCAL_COMMITS_PRESENT
          message: Local source has commits ahead of upstream.
        - code: DIRTY_WORKTREE
          message: Local source has uncommitted changes.
        - code: GIT_COMMAND_FAILED
          message: Git fetch, pull, or status failed.
business_logic:
  flow:
    - The status endpoint fetches upstream refs and returns ahead/behind metadata without modifying workspace files.
    - The update endpoint requires confirmation, repeats the status check, and only runs git pull --ff-only when the checkout can update safely.
    - Desktop UI can expose status and update actions, while CLI remains the baseline execution surface.
