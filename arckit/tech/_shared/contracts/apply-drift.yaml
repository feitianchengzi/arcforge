metadata:
  path: tech/_shared/contracts/apply-drift.yaml
  domain: profiles-sync
  owner: electron/main
  version: 3
  created: 2026-06-01
  updated: 2026-06-01
endpoint:
  transport: electron-ipc
  channel: apply:drift
  method_name: driftFromSource
  summary: Compare a profile from the current workspace or another Skill project against a target directory.
  auth_required: false
request:
  args:
    - name: root
      type: string
      required: true
    - name: from
      type: string
      required: false
    - name: profile
      type: string
      required: true
    - name: targetDir
      type: string
      required: true
    - name: skills
      type: string[]
      required: false
responses:
  success:
    schema:
      $ref: "../models/DriftReport.yaml"
  errors:
    - code: PROFILE_NOT_FOUND
      message: Profile not found.
    - code: SOURCE_NOT_FOUND
      message: Source Skill project cannot be resolved.
    - code: FILE_HASH_FAILED
      message: A compared file cannot be read for hashing.
business_logic:
  flow:
    - Resolve from to a local Skill project root when provided; otherwise use the current workspace.
    - Select profile skills, optional explicit skills and all shared assets.
    - Build SHA-256 directory signatures.
    - Return missing, changed, extra, and same statuses.
